name: test

on:
  push:
  pull_request:

jobs:
  jdk-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Run tests
        shell: pwsh
        run: .\run-tests.ps1

