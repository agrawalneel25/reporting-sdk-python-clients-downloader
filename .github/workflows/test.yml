name: test

on:
  push:
  pull_request:

jobs:
  jdk-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Run tests on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\run-tests.ps1
      - name: Run tests on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: bash ./run-tests.sh
